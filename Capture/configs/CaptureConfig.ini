[capture]
SUBJECT_NAME = capture.packet
STREAM_NAME = capture_stream
natsURL = nats://localhost:4222
inputFolderPath = ../inputPcapFiles
packetSnifferMode = Live                 ;File/Live/Both
interfaceName = eth0
microsecondMultiplier = 1000000
ethernetHeaderSize = 14
minCaptureLength = 42
udpProtocolNumber = 17
timeFormat = %Y-%m-%d %H:%M:%S


[offset]
sourceIPOffset = 12
destinationIPOffset = 16
sourcePortOffset = 20
destinationPortOffset = 22
byteShift = 8


[filter]
sourceIPs = 172.17.167.68,172.17.160.1
destinationIPs = 172.17.167.68,172.17.160.1
sourcePorts = 5060
destinationPorts = 5060
